name: Build Windows app

# Manual runs produce a downloadable artifact for testing.
# Pushing a tag like v1.0.0 builds AND publishes the exe to a GitHub Release.
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write # required to create/attach the Release

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Tesseract
        shell: pwsh
        run: choco install tesseract --no-progress -y

      - name: Stage Tesseract for bundling
        shell: pwsh
        run: |
          $src = "C:\Program Files\Tesseract-OCR"
          if (-not (Test-Path $src)) { throw "Tesseract not found at $src" }
          Copy-Item -Recurse -Force $src tesseract
          if (-not (Test-Path "tesseract\tesseract.exe")) { throw "tesseract.exe missing after copy" }
          if (-not (Test-Path "tesseract\tessdata\eng.traineddata")) { throw "eng.traineddata missing after copy" }

      - name: Install Python dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build executable
        shell: pwsh
        run: pyinstaller packaging/pdf_table_reader.spec

      - name: Smoke test (boots and serves)
        shell: pwsh
        run: |
          $exe = "dist\PDFTableReader.exe"
          if (-not (Test-Path $exe)) { throw "Build failed: $exe not found" }
          $proc = Start-Process $exe -PassThru
          $ok = $false
          foreach ($i in 1..90) {
            try {
              $r = Invoke-WebRequest "http://localhost:8501/_stcore/health" -UseBasicParsing -TimeoutSec 2
              if ($r.StatusCode -eq 200) { $ok = $true; break }
            } catch { Start-Sleep -Seconds 2 }
          }
          # Stop the app and any child processes it spawned.
          try { Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue } catch {}
          Get-Process -Name "PDFTableReader" -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue
          if (-not $ok) { throw "Smoke test failed: /_stcore/health never returned 200" }
          Write-Host "Smoke test passed: app booted and served the health endpoint."

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: PDFTableReader-windows
          path: dist/PDFTableReader.exe
          if-no-files-found: error

      - name: Publish to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/PDFTableReader.exe
          generate_release_notes: true
